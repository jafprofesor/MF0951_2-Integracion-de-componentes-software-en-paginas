<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 4: Validación en el Backend</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Validación en el Backend</h1>
      <p class="descripcion">
        Este formulario valida los datos en el servidor usando Joi
      </p>

      <form id="formulario-backend">
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" />
          <span class="error" id="error-nombre"></span>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" />
          <span class="error" id="error-email"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input type="password" id="password" name="password" />
          <span class="error" id="error-password"></span>
          <span class="requisitos"
            >Debe tener al menos 8 caracteres, una mayúscula, una minúscula, un
            número y un carácter especial</span
          >
        </div>

        <div class="form-group">
          <label for="edad">Edad:</label>
          <input type="number" id="edad" name="edad" />
          <span class="error" id="error-edad"></span>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono:</label>
          <input type="tel" id="telefono" name="telefono" />
          <span class="error" id="error-telefono"></span>
          <span class="requisitos">Formato: 123-456-789 o 123456789</span>
        </div>

        <div class="form-group">
          <label for="pais">País:</label>
          <select id="pais" name="pais">
            <option value="">Selecciona un país</option>
            <option value="es">España</option>
            <option value="mx">México</option>
            <option value="ar">Argentina</option>
            <option value="co">Colombia</option>
            <option value="pe">Perú</option>
            <option value="cl">Chile</option>
          </select>
          <span class="error" id="error-pais"></span>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="terminos" name="terminos" value="true" />
            Acepto los términos y condiciones
          </label>
          <span class="error" id="error-terminos"></span>
        </div>

        <button type="submit">Registrarse</button>
      </form>

      <div id="resultado" class="resultado"></div>
      <div id="spinner" class="spinner"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
